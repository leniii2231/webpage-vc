<!-- Fan Message / Collaboration Section -->
  <section id="contact" class="bg-light py-5">
    <div class="container">
      <h2 class="text-center mb-4">Send a Message to Your Favorite Group</h2>
      <p class="text-center mb-5">Have a question, collaboration idea, or just want to say hi? Fill out the form below!</p>
      <form class="mx-auto" style="max-width: 600px;">
        <div class="mb-3">
          <label for="fanName" class="form-label">Your Name</label>
          <input type="text" class="form-control" id="fanName" placeholder="Your full name">
        </div>
        <div class="mb-3">
          <label for="fanEmail" class="form-label">Email</label>
          <input type="email" class="form-control" id="fanEmail" placeholder="Your email">
        </div>
        <div class="mb-3">
          <label for="groupSelect" class="form-label">Select Group</label>
          <select class="form-select" id="groupSelect">
            <option selected>Choose a group</option>
            <option value="bts">BTS</option>
            <option value="blackpink">BLACKPINK</option>
            <option value="enhypen">ENHYPEN</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="fanMessage" class="form-label">Message</label>
          <textarea class="form-control" id="fanMessage" rows="5" placeholder="Write your message here"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Message</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer text-center py-3">

  </footer>
